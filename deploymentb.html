<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Uplift Programme - Deployment</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --primary: #660099;
            --accent: #38a169;
            --danger: #e53e3e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0.4rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 { font-size: 0.95rem; font-weight: 600; }
        .logo span { font-size: 0.7rem; color: var(--text-light); }

        .force-select-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .force-select-wrap label {
            font-size: 0.65rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        #force-select {
            font-family: inherit;
            font-size: 0.78rem;
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            background: white;
            cursor: pointer;
            min-width: 200px;
        }
        #force-select:focus {
            outline: 2px solid var(--primary);
            outline-offset: 1px;
        }

        .stats-bar {
            display: flex;
            gap: 1.5rem;
            padding: 0.35rem 1.2rem;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label {
            font-size: 0.6rem; color: var(--text-light);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .stat-value { font-size: 0.95rem; font-weight: 700; color: var(--primary); }
        .stat-value.success { color: var(--accent); }
        .stat-value.danger { color: var(--danger); }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 1.2rem 0;
            background: var(--card);
        }
        .play-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 26px; height: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            flex-shrink: 0;
        }
        .play-btn:hover { opacity: 0.85; }
        .year-display {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            min-width: 46px;
            flex-shrink: 0;
        }
        .slider-wrap {
            flex: 1;
            position: relative;
        }
        .slider-wrap input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            margin: 0;
        }
        .year-ticks {
            display: flex;
            justify-content: space-between;
            padding: 0 2px;
            margin-top: 1px;
            user-select: none;
        }
        .year-ticks span {
            font-size: 0.58rem;
            color: var(--text-light);
            text-align: center;
            width: 0;
            overflow: visible;
            white-space: nowrap;
            cursor: pointer;
        }
        .year-ticks span:first-child { text-align: left; }
        .year-ticks span:last-child { text-align: right; }
        .year-ticks span.tick-current {
            color: var(--primary);
            font-weight: 700;
        }
        .slider-bottom {
            padding: 0 1.2rem 0.35rem;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
        }
        .scale-note { font-size: 0.62rem; color: var(--text-light); }

        .main-layout {
            display: grid;
            grid-template-columns: 7fr 3fr;
            height: calc(100vh - 115px);
            overflow: hidden;
        }

        .left-panel {
            overflow-y: auto;
            padding: 0.6rem 0.6rem 0.6rem 1rem;
        }

        .right-panel {
            border-left: 1px solid var(--border);
            background: #fafbfc;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 0;
        }
        .right-panel-header {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.5rem 0.6rem 0.25rem;
        }
        #flow-chart { width: 100%; flex: 1; min-height: 0; }

        .flow-summary {
            padding: 0.4rem 0.6rem;
            border-top: 1px solid var(--border);
            font-size: 0.68rem;
            color: var(--text-light);
        }
        .flow-summary .flow-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
        }
        .flow-summary .flow-val { font-weight: 600; }
        .flow-summary .flow-val.positive { color: #7b2d8e; }
        .flow-summary .flow-val.negative { color: var(--danger); }

        .func-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 0.4rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .func-row:last-child { border-bottom: none; margin-bottom: 0; }

        .func-label {
            width: 130px;
            flex-shrink: 0;
            padding-right: 0.4rem;
        }
        .func-name {
            font-size: 0.7rem;
            font-weight: 600;
            line-height: 1.2;
        }
        .func-meta { font-size: 0.6rem; color: var(--text-light); }

        .func-blocks-area {
            display: flex;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }

        .active-grid {
            display: grid;
            gap: 2px;
            align-content: start;
        }

        .block {
            border-radius: 2px;
            transition: opacity 0.2s;
        }
        .block:hover {
            transform: scale(1.4);
            z-index: 10;
            position: relative;
        }
        .uplift-block {
            position: relative;
            overflow: hidden;
        }
        .uplift-block::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('youngofficerhead.png');
            background-size: 90%;
            background-position: center;
            background-repeat: no-repeat;
            filter: invert(1);
            mix-blend-mode: screen;
            opacity: 0.7;
        }

        .func-delta {
            flex-shrink: 0;
            text-align: left;
            font-size: 0.65rem;
            padding-top: 2px;
            margin-left: 12px;
            white-space: nowrap;
        }
        .func-delta.positive { color: var(--accent); }
        .func-delta.negative { color: var(--danger); }
        .func-delta.neutral { color: var(--text-light); }

        .tooltip {
            display: none;
            position: fixed;
            background: rgba(0,0,0,0.88);
            color: white;
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 7fr 3fr; }
            .func-label { width: 100px; }
        }
    </style>

    const FUNC_COLORS = {
        "Local Policing": "#0072B2",
        "Investigations": "#D55E00",
        "Public Protection": "#009E73",
        "Support Functions": "#CC79A7",
        "Operational Support": "#E69F00",
        "National Policing": "#56B4E9",
        "Intelligence": "#b8a000",
        "Criminal Justice": "#888888",
        "Road Policing": "#882255",
        "Dealing with Public": "#44AA99",
        "Investigative Support": "#DDCC77",
        "Other/Not stated": "#aaaaaa"
    };

    const FUNC_ORDER = [
        "Local Policing", "Investigations", "Public Protection",
        "Operational Support", "National Policing", "Support Functions",
        "Other/Not stated", "Intelligence", "Road Policing",
        "Criminal Justice", "Dealing with Public", "Investigative Support"
    ];

    const MERGED_ORDER = [
        "Local Policing", "Investigations (incl. PP)",
        "Operational Support", "National Policing", "Support Functions",
        "Other/Not stated", "Intelligence", "Road Policing",
        "Criminal Justice", "Dealing with Public", "Investigative Support"
    ];

    const REF_YEAR = 2019;
    const YEARS = [2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025];

    // ============================================================
    // STATE
    // ============================================================
    let currentYear = 2015;
    let currentForce = '__national__';
    let playing = false;
    let playInterval = null;

    const slider = document.getElementById('year-slider');
    const yearDisplay = document.getElementById('year-display');
    const tooltip = document.getElementById('tooltip');
    const forceSelect = document.getElementById('force-select');

    // ============================================================
    // FORCE SELECTOR
    // ============================================================
    function titleCase(s) {
        return s.replace(/\b\w/g, c => c.toUpperCase());
    }

    function buildForceSelector() {
        FORCE_LIST.forEach(f => {
            const opt = document.createElement('option');
            opt.value = f;
            opt.textContent = titleCase(f);
            forceSelect.appendChild(opt);
        });
    }

    forceSelect.addEventListener('change', (e) => {
        currentForce = e.target.value;
        initFlowChart();
        updateAll();
    });

    // ============================================================
    // DATA ACCESSORS
    // ============================================================
    function isNational() { return currentForce === '__national__'; }

    function getFuncData() {
        if (isNational()) return NAT_FUNC_DATA;
        const fd = FORCE_FUNC_DATA[currentForce];
        if (!fd) return {};
        const out = {};
        for (const yr of YEARS) {
            out[yr] = fd[yr] || {};
        }
        return out;
    }

    function getFlowData() {
        if (isNational()) return NAT_FLOW_DATA;
        const fd = FORCE_FLOW_DATA[currentForce];
        if (!fd) return {};
        const out = {};
        for (const yr of YEARS) {
            out[yr] = fd[yr] || {joiners: 0, leavers: 0};
        }
        return out;
    }

    function getScale() {
        if (isNational()) return 1000;
        const funcData = getFuncData();
        const totals = YEARS.map(yr => {
            const d = funcData[yr] || {};
            return Object.values(d).reduce((a, b) => a + b, 0);
        });
        const maxTotal = Math.max(...totals);
        if (maxTotal > 10000) return 500;
        if (maxTotal > 5000) return 200;
        if (maxTotal > 2000) return 100;
        if (maxTotal > 500) return 50;
        return 20;
    }

    function getBlockSize() {
        const scale = getScale();
        if (scale >= 500) return 40;
        if (scale >= 100) return 28;
        return 22;
    }

    function getGridCols() {
        const scale = getScale();
        if (scale >= 500) return 20;
        if (scale >= 100) return 25;
        return 30;
    }

    // ============================================================
    // YEAR TICKS
    // ============================================================
    function buildYearTicks() {
        const container = document.getElementById('year-ticks');
        container.innerHTML = '';
        for (const yr of YEARS) {
            const s = document.createElement('span');
            s.textContent = yr;
            s.addEventListener('click', () => {
                currentYear = yr;
                slider.value = yr;
                updateAll();
            });
            container.appendChild(s);
        }
    }

    function updateTickHighlight() {
        const ticks = document.querySelectorAll('.year-ticks span');
        ticks.forEach((t, i) => {
            const yr = YEARS[i];
            t.classList.remove('tick-current');
            if (yr === currentYear) t.classList.add('tick-current');
        });
    }

    slider.addEventListener('input', (e) => {
        currentYear = parseInt(e.target.value);
        updateAll();
    });

    function togglePlay() {
        playing = !playing;
        const btn = document.getElementById('play-btn');
        if (playing) {
            btn.innerHTML = '&#9646;&#9646;';
            playInterval = setInterval(() => {
                currentYear++;
                if (currentYear > 2025) currentYear = 2015;
                slider.value = currentYear;
                updateAll();
            }, 1200);
        } else {
            btn.innerHTML = '&#9654;';
            clearInterval(playInterval);
        }
    }

    // ============================================================
    // FLOW CHART
    // ============================================================
    function initFlowChart() {
        const flowData = getFlowData();
        const joiners = YEARS.map(y => (flowData[y] || {joiners:0}).joiners);
        const leavers = YEARS.map(y => -(flowData[y] || {leavers:0}).leavers);
        const net = YEARS.map((y, i) => joiners[i] + leavers[i]);

        const jColors = YEARS.map(y => y === currentYear ? '#7b2d8e' : '#d8c5e8');
        const lColors = YEARS.map(y => y === currentYear ? '#d14545' : '#ecc5c5');

        const traceJoiners = {
            x: YEARS, y: joiners,
            type: 'bar', name: 'Joiners',
            marker: { color: jColors },
            hovertemplate: '%{x}: +%{y:,.0f}<extra>Joiners</extra>'
        };
        const traceLeavers = {
            x: YEARS, y: leavers,
            type: 'bar', name: 'Leavers',
            marker: { color: lColors },
            hovertemplate: '%{x}: %{customdata:,.0f}<extra>Leavers</extra>',
            customdata: leavers.map(v => Math.abs(v))
        };
        const traceNet = {
            x: YEARS, y: net,
            type: 'scatter', mode: 'lines+markers',
            name: 'Net Change',
            line: { color: '#7b2d8e', width: 1.5, dash: 'dot' },
            marker: { size: 4, color: '#7b2d8e' },
            hovertemplate: '%{x}: %{y:+,.0f}<extra>Net Change</extra>'
        };

        const maxY = Math.max(...joiners, 1000);
        const minY = Math.min(...leavers, -1000);

        const shapes = [{
            type: 'rect', x0: 2019.5, x1: 2023.5,
            y0: minY * 1.1, y1: maxY * 1.05,
            fillcolor: 'rgba(0,158,115,0.08)',
            line: { width: 0 }
        }];

        const annotations = [{
            x: 2021.5, y: maxY * 0.92,
            text: '<b>Uplift</b>',
            showarrow: false,
            font: { size: 10, color: '#009E73' }
        }];

        const layout = {
            barmode: 'relative',
            margin: { l: 40, r: 8, t: 8, b: 22 },
            xaxis: {
                tickvals: YEARS,
                tickfont: { size: 8 },
                tickangle: -45,
                fixedrange: true
            },
            yaxis: {
                tickformat: '~s',
                tickfont: { size: 8 },
                zeroline: true, zerolinecolor: '#ccc', zerolinewidth: 1,
                fixedrange: true
            },
            legend: {
                orientation: 'h', x: 0.5, xanchor: 'center', y: 1.02,
                font: { size: 8 }
            },
            shapes: shapes,
            annotations: annotations,
            plot_bgcolor: 'transparent',
            paper_bgcolor: 'transparent',
            bargap: 0.2
        };

        Plotly.newPlot('flow-chart', [traceJoiners, traceLeavers, traceNet], layout, {
            displayModeBar: false,
            responsive: true
        });
    }

    function updateFlowHighlight() {
        const jColors = YEARS.map(y => y === currentYear ? '#7b2d8e' : '#d8c5e8');
        const lColors = YEARS.map(y => y === currentYear ? '#d14545' : '#ecc5c5');
        Plotly.restyle('flow-chart', { 'marker.color': [jColors] }, [0]);
        Plotly.restyle('flow-chart', { 'marker.color': [lColors] }, [1]);
    }

    function updateFlowSummary() {
        const flowData = getFlowData();
        const d = flowData[currentYear] || {joiners: 0, leavers: 0};
        const net = d.joiners - d.leavers;
        const netCls = net >= 0 ? 'positive' : 'negative';
        const netSign = net >= 0 ? '+' : '';

        document.getElementById('flow-summary').innerHTML = `
            <div class="flow-row">
                <span>Joiners</span>
                <span class="flow-val positive">+${d.joiners.toLocaleString()}</span>
            </div>
            <div class="flow-row">
                <span>Leavers</span>
                <span class="flow-val negative">-${d.leavers.toLocaleString()}</span>
            </div>
            <div class="flow-row" style="border-top:1px solid var(--border);padding-top:3px;margin-top:2px;">
                <span style="font-weight:600;">Net Change</span>
                <span class="flow-val ${netCls}">${netSign}${net.toLocaleString()}</span>
            </div>
        `;
    }

    // ============================================================
    // BLOCK CHART
    // ============================================================
    function getEffectiveData(year) {
        const funcData = getFuncData();
        const raw = funcData[year] || {};
        if (year >= 2017) return { data: raw, merged: false };
        const merged = Object.assign({}, raw);
        merged['Investigations (incl. PP)'] = (raw['Investigations'] || 0) + (raw['Public Protection'] || 0);
        delete merged['Investigations'];
        delete merged['Public Protection'];
        return { data: merged, merged: true };
    }

    function renderChart() {
        const chart = document.getElementById('chart-area');
        chart.innerHTML = '';

        const SCALE = getScale();
        const blockSize = getBlockSize();
        const gridCols = getGridCols();

        document.getElementById('scale-note').textContent = `1 block = ${SCALE.toLocaleString()} FTE`;
        document.getElementById('subtitle').textContent = isNational()
            ? 'Function Deployment 2015\u20132025 \u00b7 All Forces'
            : `Function Deployment 2015\u20132025 \u00b7 ${titleCase(currentForce)}`;

        const { data: curData, merged: curMerged } = getEffectiveData(currentYear);
        const { data: refData } = getEffectiveData(REF_YEAR);
        const { data: baseData } = getEffectiveData(2019);
        const prevYear = currentYear > 2015 ? currentYear - 1 : null;
        const prevEff = prevYear ? getEffectiveData(prevYear) : null;

        const order = curMerged ? MERGED_ORDER : FUNC_ORDER;

        const noteEl = document.getElementById('data-note');
        if (curMerged) {
            noteEl.textContent = '2015\u20132016: "Public Protection" classified under "Investigations" \u2014 shown merged.';
            noteEl.style.display = 'block';
        } else if (currentYear === 2017) {
            noteEl.textContent = '2017: "Public Protection" split from "Investigations" \u2014 YoY not comparable.';
            noteEl.style.display = 'block';
        } else {
            noteEl.style.display = 'none';
        }

        for (const func of order) {
            const fteCur = curData[func] || 0;
            const refKey = (func === 'Investigations (incl. PP)') ? 'Investigations (incl. PP)' : func;
            const fteRef = refData[refKey] || 0;

            let ftePrev = fteCur;
            if (prevEff) {
                const prevKey = (func === 'Investigations (incl. PP)' && !prevEff.merged)
                    ? null
                    : (prevEff.merged && func === 'Investigations') ? null
                    : func;
                if (prevKey === null) {
                    ftePrev = fteCur;
                } else {
                    ftePrev = prevEff.data[prevKey] || 0;
                }
            }

            if (fteRef === 0 && fteCur === 0) continue;

            const blocksCur = Math.max(0, Math.round(fteCur / SCALE));
            const isMergedFunc = func === 'Investigations (incl. PP)';
            const color = isMergedFunc ? FUNC_COLORS['Investigations'] : (FUNC_COLORS[func] || '#999');
            const change = fteCur - fteRef;
            const yoyChange = fteCur - ftePrev;
            const showYoY = !(currentYear === 2017 && (func === 'Investigations' || func === 'Public Protection'));

            let fteBase2019;
            if (isMergedFunc) {
                fteBase2019 = (baseData['Investigations'] || 0) + (baseData['Public Protection'] || 0);
            } else {
                fteBase2019 = baseData[func] || 0;
            }
            const blocksBase2019 = Math.round(fteBase2019 / SCALE);
            const greyBlocks = currentYear > 2019 ? Math.max(0, blocksBase2019 - blocksCur) : 0;
            const upliftBlocks = currentYear > 2019 ? Math.max(0, blocksCur - blocksBase2019) : 0;

            const row = document.createElement('div');
            row.className = 'func-row';

            const label = document.createElement('div');
            label.className = 'func-label';
            const displayName = isMergedFunc
                ? '<span style="font-size:0.62rem">Investigations<br>(incl. Public Prot.)</span>'
                : func;
            label.innerHTML = `
                <div class="func-name" style="color:${color}">${displayName}</div>
                <div class="func-meta">${Math.round(fteCur).toLocaleString()} FTE</div>
            `;

            const activeGrid = document.createElement('div');
            activeGrid.className = 'active-grid';
            activeGrid.style.gridTemplateColumns = `repeat(${gridCols}, ${blockSize}px)`;

            const tooltipFunc = isMergedFunc ? 'Investigations (incl. PP)' : func;

            const upliftStart = blocksCur - upliftBlocks;
            for (let i = 0; i < blocksCur; i++) {
                const b = document.createElement('div');
                b.className = 'block';
                b.style.width = blockSize + 'px';
                b.style.height = blockSize + 'px';
                b.style.backgroundColor = color;
                b.style.opacity = '0.85';

                if (i >= upliftStart && upliftBlocks > 0) {
                    b.classList.add('uplift-block');
                }

                b.addEventListener('mouseenter', (e) => {
                    tooltip.style.display = 'block';
                    const isUplift = i >= upliftStart && upliftBlocks > 0;
                    tooltip.textContent = isUplift
                        ? `${tooltipFunc}: +${upliftBlocks * SCALE} FTE since 2019 baseline`
                        : `${tooltipFunc}: ${Math.round(fteCur).toLocaleString()} FTE (${blocksCur} blocks)`;
                });
                b.addEventListener('mousemove', (e) => {
                    tooltip.style.left = (e.clientX + 12) + 'px';
                    tooltip.style.top = (e.clientY - 28) + 'px';
                });
                b.addEventListener('mouseleave', () => tooltip.style.display = 'none');
                activeGrid.appendChild(b);
            }

            for (let i = 0; i < greyBlocks; i++) {
                const b = document.createElement('div');
                b.className = 'block';
                b.style.width = blockSize + 'px';
                b.style.height = blockSize + 'px';
                b.style.backgroundColor = '#d0d0d0';
                b.style.opacity = '0.45';

                const lostFte = Math.round(fteBase2019 - fteCur);
                b.addEventListener('mouseenter', (e) => {
                    tooltip.style.display = 'block';
                    tooltip.textContent = `${tooltipFunc}: -${lostFte.toLocaleString()} FTE vs 2019 baseline`;
                });
                b.addEventListener('mousemove', (e) => {
                    tooltip.style.left = (e.clientX + 12) + 'px';
                    tooltip.style.top = (e.clientY - 28) + 'px';
                });
                b.addEventListener('mouseleave', () => tooltip.style.display = 'none');
                activeGrid.appendChild(b);
            }

            const delta = document.createElement('div');
            delta.className = 'func-delta';
            const fmtPct = (val, ref) => {
                if (ref === 0) return '';
                const pct = (val / ref * 100).toFixed(1);
                return ` (${val >= 0 ? '+' : ''}${pct}%)`;
            };

            const fmtLine = (label, val, ref, cls) => {
                const sign = val >= 0 ? '+' : '';
                return `<div style="${cls}">vs ${label}: ${sign}${Math.round(val).toLocaleString()}${fmtPct(val, ref)}</div>`;
            };

            if (currentYear === REF_YEAR) {
                delta.classList.add('neutral');
                let baseHtml = '<div>vs baseline: \u2013</div>';
                if (showYoY && yoyChange !== 0) {
                    const yoyCls = yoyChange >= 0 ? 'color:var(--accent)' : 'color:var(--danger)';
                    baseHtml += fmtLine('prev', yoyChange, ftePrev, yoyCls);
                } else {
                    baseHtml += '<div>vs prev: \u2013</div>';
                }
                delta.innerHTML = baseHtml;
            } else {
                const cls = change >= 0 ? 'positive' : 'negative';
                delta.classList.add(cls);
                let deltaHtml = fmtLine('baseline', change, fteRef, '');
                if (!showYoY) {
                    deltaHtml += '<div>vs prev: \u2013</div>';
                } else if (yoyChange !== 0) {
                    const yoyCls = yoyChange >= 0 ? 'color:var(--accent)' : 'color:var(--danger)';
                    deltaHtml += fmtLine('prev', yoyChange, ftePrev, yoyCls);
                } else {
                    deltaHtml += '<div>vs prev: 0</div>';
                }
                delta.innerHTML = deltaHtml;
            }

            row.appendChild(label);
            row.appendChild(activeGrid);
            row.appendChild(delta);
            chart.appendChild(row);
        }
    }

    // ============================================================
    // STATS
    // ============================================================
    function updateStats() {
        const funcData = getFuncData();
        const curData = funcData[currentYear] || {};
        const data2019 = funcData[2019] || {};

        const totalCur = Object.values(curData).reduce((a, b) => a + b, 0);
        const total2019 = Object.values(data2019).reduce((a, b) => a + b, 0);

        document.getElementById('stat-total').textContent = Math.round(totalCur).toLocaleString();

        const el2019 = document.getElementById('stat-vs2019');
        if (currentYear <= 2019) {
            el2019.textContent = '\u2014';
            el2019.className = 'stat-value';
        } else {
            const vs2019 = totalCur - total2019;
            el2019.textContent = (vs2019 >= 0 ? '+' : '') + Math.round(vs2019).toLocaleString();
            el2019.className = 'stat-value ' + (vs2019 >= 0 ? 'success' : 'danger');
        }

        const lpFte = curData['Local Policing'] || 0;
        const invFte = (curData['Investigations'] || 0) + (curData['Public Protection'] || 0);

        document.getElementById('stat-lp').textContent = Math.round(lpFte).toLocaleString();
        document.getElementById('stat-inv').textContent = Math.round(invFte).toLocaleString();
    }

    // ============================================================
    // UPDATE ALL
    // ============================================================
    function updateAll() {
        yearDisplay.textContent = currentYear;
        renderChart();
        updateFlowHighlight();
        updateFlowSummary();
        updateStats();
        updateTickHighlight();
    }

    // Init
    buildForceSelector();
    buildYearTicks();
    initFlowChart();
    updateAll();
    </script>
</body>
</html>
